<canvas id="band-activity-chart" height="80"></canvas>
<div id="band-activity-empty" class="d-none alert alert-info text-center mb-0" role="alert">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-info-circle mb-2" viewBox="0 0 16 16">
        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
        <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
    </svg>
    <p class="mb-0">Keine Band-Aktivitätsdaten im gewählten Zeitraum verfügbar</p>
</div>

<script>
(function() {
    const ctx = document.getElementById('band-activity-chart');
    const emptyState = document.getElementById('band-activity-empty');
    if (!ctx) return;

    const data = {{ band_activity|safe }};

    if (!data || data.length === 0) {
        ctx.style.display = 'none';
        emptyState.classList.remove('d-none');
        return;
    }

    const labels = data.map(d => d.band);
    const counts = data.map(d => d.count);

    // Generate distinct colors for each band
    const colors = [
        'rgba(255, 99, 132, 0.8)',
        'rgba(54, 162, 235, 0.8)',
        'rgba(255, 206, 86, 0.8)',
        'rgba(75, 192, 192, 0.8)',
        'rgba(153, 102, 255, 0.8)',
        'rgba(255, 159, 64, 0.8)',
        'rgba(199, 199, 199, 0.8)',
    ];

    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: counts,
                backgroundColor: colors.slice(0, data.length),
                borderColor: '#fff',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    display: true,
                    position: 'right'
                }
            }
        }
    });
})();
</script>
