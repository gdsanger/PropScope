<canvas id="snr-by-hour-chart" height="80"></canvas>
<div id="snr-by-hour-empty" class="d-none alert alert-info text-center mb-0" role="alert">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-info-circle mb-2" viewBox="0 0 16 16">
        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
        <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
    </svg>
    <p class="mb-0">Keine SNR-Daten im gewählten Zeitraum verfügbar</p>
</div>

<script>
(function() {
    const ctx = document.getElementById('snr-by-hour-chart');
    const emptyState = document.getElementById('snr-by-hour-empty');
    if (!ctx) return;

    const data = {{ distance_by_hour|safe }};

    // Check if we have any SNR data
    const hasData = data && data.length > 0 && data.some(d => d.avg_snr !== null && d.avg_snr !== undefined);

    if (!hasData) {
        ctx.style.display = 'none';
        emptyState.classList.remove('d-none');
        return;
    }

    // Create array for all hours (0-23) with default null values
    const hours = Array.from({length: 24}, (_, i) => i);
    const avgSnr = hours.map(hour => {
        const found = data.find(d => d.hour === hour);
        return found && found.avg_snr !== null ? found.avg_snr : null;
    });

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: hours,
            datasets: [{
                label: 'Durchschnittlicher SNR',
                data: avgSnr,
                backgroundColor: 'rgba(153, 102, 255, 0.2)',
                borderColor: 'rgba(153, 102, 255, 1)',
                borderWidth: 2,
                tension: 0.1,
                spanGaps: true,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                y: {
                    title: {
                        display: true,
                        text: 'SNR (dB)'
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: 'Stunde (UTC)'
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });
})();
</script>
